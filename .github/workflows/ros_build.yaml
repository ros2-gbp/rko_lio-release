name: ROS Build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  check_relevant_changes:
    runs-on: ubuntu-latest
    outputs:
      continue_run: ${{ steps.check.outputs.continue_run }}
    env:
      IGNORED_FOLDERS: "rko_lio/python|docs|tests/python|tests/core|cmake/dependencies/catch2"
      IGNORED_FILES: "pyproject.toml|CHANGELOG.rst|LICENSE|README.md"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: check
        run: |
          changed_files=$(git diff --name-only origin/master)
          echo "Changed files: $changed_files"
          if echo "$changed_files" | grep -vE "^($IGNORED_FOLDERS)/|^($IGNORED_FILES)$" > /dev/null; then
            echo "continue_run=true" >> $GITHUB_OUTPUT
          else
            echo "continue_run=false" >> $GITHUB_OUTPUT
          fi
  ros_build_with_rosdep:
    needs: check_relevant_changes
    if: needs.check_relevant_changes.outputs.continue_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {ros_distro: humble, container_image: "ros:humble-ros-base"}
          - {ros_distro: jazzy, container_image: "ros:jazzy-ros-base"}
          - {ros_distro: kilted, container_image: "ros:kilted-ros-base"}
          - {ros_distro: lyrical, container_image: "ros:lyrical-ros-base",}
          # - { ros_distro: rolling, container_image: "ros:rolling-ros-base"}
    container:
      image: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v7
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y build-essential cmake git
      - name: Source ROS environment, install dependencies, and build
        run: |
          . /opt/ros/${{ matrix.ros_distro }}/setup.sh
          rosdep init 2>/dev/null || true
          rosdep update
          rosdep install --from-paths . --ignore-src -r -y
          colcon build --event-handlers console_direct+
  ros_build_no_rosdep:
    needs: check_relevant_changes
    if: needs.check_relevant_changes.outputs.continue_run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {ros_distro: humble, container_image: "ros:humble-ros-base"}
          - {ros_distro: jazzy, container_image: "ros:jazzy-ros-base"}
          - {ros_distro: kilted, container_image: "ros:kilted-ros-base"}
          - {ros_distro: lyrical, container_image: "ros:lyrical-ros-base"}
          - {ros_distro: rolling, container_image: "ros:rolling-ros-base"}
    container:
      image: ${{ matrix.container_image }}
    steps:
      - uses: actions/checkout@v7
      - name: Install build tools
        run: |
          apt-get update
          apt-get install -y build-essential cmake git
      - name: Source ROS environment and build with extra CMake args
        run: |
          . /opt/ros/${{ matrix.ros_distro }}/setup.sh
          colcon build --event-handlers console_direct+ \
            --cmake-args -DRKO_LIO_FETCH_CONTENT_DEPS=ON -DRKO_LIO_BUILD_TESTS=ON
      - name: Run core C++ tests via colcon
        run: |
          . /opt/ros/${{ matrix.ros_distro }}/setup.sh
          colcon test --event-handlers console_direct+ --return-code-on-test-failure
          colcon test-result --verbose
